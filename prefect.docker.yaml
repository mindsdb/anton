# Welcome to your prefect.yaml file! You can use this file for storing and managing
# configuration for deploying your flows. We recommend committing this file to source
# control along with your flow code.

# Generic metadata about this project
name: minds-flows
prefect-version: 3.4.18

definitions:
  tags: &common_tags
    - "minds"
    - "ENV_PLACEHOLDER"
    - "IMAGE_TAG_PLACEHOLDER"
  image: &default_image "mindsdb/minds:IMAGE_TAG_PLACEHOLDER"
  work_pools:
    default: &default_work_pool
      name: standard-worker-pool
      job_variables:
        image: *default_image
        image_pull_policy: "Never"
        env:
          PREFECT_API_URL: "http://host.docker.internal:4200/api"
          ENV: "ENV_PLACEHOLDER"
          
# the deployments section allows you to provide configuration for deploying flows
deployments:
- name: "ENV_PLACEHOLDER--data-catalog-loader"
  version: null
  tags: *common_tags
  concurrency_limit: null
  description: Load data catalog information from MindsDB into the local database.
  entrypoint: minds/jobs/data_catalog_loader_flow.py:load_data_catalog
  parameters: {}
  work_pool: *default_work_pool
  schedules: []
