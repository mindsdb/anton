apiVersion: batch/v1
kind: Job
metadata:
  name: minds-langfuse-benchmarks
  namespace: ${NAMESPACE}
spec:
  backoffLimit: 0
  template:
    spec:
      activeDeadlineSeconds: 900
      restartPolicy: Never
      containers:
        - name: minds-langfuse-benchmarks
          image: 168681354662.dkr.ecr.us-east-1.amazonaws.com/minds-langfuse-benchmarks:latest
          imagePullPolicy: Always
          command: ["/bin/sh", "-c"]
          args:
            - >
              python -m src.scripts.run_langfuse_experiments \
                --minds-base-url "${MINDS_BASE_URL}" \
                --langfuse-host "https://langfuse.dev.mindsdb.com" \
                --pr-number "${PR_NUMBER}"
          env:
            - name: MINDS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: minds-test-user
                  key: api_key
            - name: LANGFUSE_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: mindsdb-secrets
                  key: LANGFUSE_PUBLIC_KEY
            - name: LANGFUSE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: mindsdb-secrets
                  key: LANGFUSE_SECRET_KEY