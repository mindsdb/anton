deployment:
  serviceAccount:
    enabled: true
    annotations:
      # Gives permission to use the mind-castle kms key
      eks.amazonaws.com/role-arn: arn:aws:iam::168681354662:role/minds-20260204203650912200000002
      
  ingress:
    enabled: true
    name: minds
    annotations:
      nginx.ingress.kubernetes.io/enable-cors: "true"
      nginx.ingress.kubernetes.io/cors-allow-origin: "https://console-terabase.dev.mindshub.ai, https://terabase.dev.mdb.ai, https://hub-terabase.dev.mindsdb.com"
      nginx.ingress.kubernetes.io/auth-url: "http://auth.terabase-dev.svc.cluster.local:80/v1/authenticate/"
    hosts:
      - host: api-terabase.dev.mindshub.ai
        enableMultiPath: true
        paths:
          - path: /v1
            serviceName: minds
            servicePort: 80
  
  ingress_secondary:
    name: minds-legacy
    annotations:
      nginx.ingress.kubernetes.io/enable-cors: "true"
      
      # Forward auth configuration using your gateway service
      nginx.ingress.kubernetes.io/auth-url: "http://auth.terabase-dev.svc.cluster.local:80/v1/authenticate/"
    hosts:
      - host: minds-terabase.dev.mdb.ai
        enableMultiPath: true
        paths:
          - path: /
            serviceName: minds
            servicePort: 80
      
      - host: terabase.dev.mdb.ai
        enableMultiPath: true
        paths:
          - path: /api/v1/chat
            serviceName: minds
            servicePort: 80
          - path: /api/v1/minds
            serviceName: minds
            servicePort: 80
          - path: /api/v1/datasources
            serviceName: minds
            servicePort: 80
          - path: /api/v1/tree
            serviceName: minds
            servicePort: 80
          - path: /api/v1/conversations
            serviceName: minds
            servicePort: 80
          - path: /api/v1/responses
            serviceName: minds
            servicePort: 80
          - path: /api/v1/limits
            serviceName: minds
            servicePort: 80

  extraEnvs:

    # ====================================
    # GENERAL SETTINGS
    # ====================================

    - name: ENV
      value: "terabase-dev"

    # ====================================
    # LOGGING SETTINGS
    # ====================================

    - name: LOG_LEVEL
      value: "WARNING"

    # ====================================
    # LANGFUSE SETTINGS
    # ====================================

    - name: LANGFUSE_TRACING_ENVIRONMENT
      value: "terabase-dev"

    # ====================================
    # DATA CATALOG SETTINGS
    # ====================================

    - name: DATA_CATALOG__JOB_DEPLOYMENT_NAME
      value: "terabase-dev--data-catalog-loader"

    # ====================================
    # MIND CASTLE SETTINGS
    # ====================================

    - name: MIND_CASTLE_AWS_KMS_KEY_ARN
      value: "arn:aws:kms:us-east-1:168681354662:key/679a2faa-925c-4da3-bc27-d4adbdcbcb13"

    # ====================================
    # MINDS SETTINGS
    # ====================================

    - name: MINDS__ENABLE_MODEL_SELECTION
      value: "true"
    
    # ====================================
    # STATSIG SETTINGS
    # ====================================

    - name: STATSIG__ENVIRONMENT
      value: "development"
          