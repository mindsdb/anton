deployment:
  ingress:
  
    annotations:
      nginx.ingress.kubernetes.io/enable-cors: "true"
      
      # Forward auth configuration using your gateway service
      nginx.ingress.kubernetes.io/auth-url: "http://mindsdb-gateway.alpha-dev.svc.cluster.local:80/cloud/llm/api-key/"
    hosts:
      - host: minds-alpha.dev.mdb.ai
        enableMultiPath: true
        paths:
          - path: /
            serviceName: minds
            servicePort: 80
      
      - host: alpha.dev.mdb.ai
        enableMultiPath: true
        paths:
          - path: /api/v1/chat
            serviceName: minds
            servicePort: 80
          - path: /api/v1/minds
            serviceName: minds
            servicePort: 80
          - path: /api/v1/datasources
            serviceName: minds
            servicePort: 80
          - path: /api/v1/tree
            serviceName: minds
            servicePort: 80

  extraEnvs:

    # ====================================
    # GENERAL SETTINGS
    # ====================================

    - name: ENV
      value: "alpha-dev"

    # ====================================
    # LANGFUSE SETTINGS
    # ====================================

    # Langfuse
    - name: LANGFUSE_TRACING_ENVIRONMENT
      value: "alpha-dev"

    
    # ====================================
    # DATA CATALOG SETTINGS
    # ====================================

    - name: DATA_CATALOG_JOB_DEPLOYMENT_NAME
      value: "alpha-dev--data-catalog-loader"
