
# Default values for deployment, this is necessary because we're using a unified helm subchart
deployment:
  # This is the name of the deployment, this is used in a _lot_ of places in the helm charts so lets just specify it
  name: minds

  replicaCount: 2

  # What group we're in in gitlab and what namespace we deploy to in kubernetes
  image:
    repository: 168681354662.dkr.ecr.us-east-1.amazonaws.com/mindsdb-minds
    command: ["python", "-m", "uvicorn", "minds.server:app"]
    # Async FastAPI: the event loop handles concurrency per worker. Scale via
    # replicas (and HPA) rather than worker count to avoid duplicating ~300 MiB
    # of imports per process and to keep startup CPU under the limit.
    args: ["--workers", "6", "--host", "0.0.0.0", "--port", "9010", "--forwarded-allow-ips", "*"]


  # Liveness restarts the pod if it fails. Kept tolerant (failureThreshold * periodSeconds = 60s)
  # so a transient stall on a single worker doesn't take the pod down. The endpoint itself does
  # NOT hit external deps — DB hiccups should not trigger restarts.
  livenessProbe:
    enabled: true
    initialDelaySeconds: 60
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6
    path: /v1/health/live

  # Readiness gates traffic on DB connectivity. Polls quickly so the pod returns to service fast
  # after a hiccup. failureThreshold * periodSeconds = 15s before the pod is pulled from endpoints.
  readinessProbe:
    enabled: true
    initialDelaySeconds: 15
    periodSeconds: 5
    timeoutSeconds: 4
    failureThreshold: 3
    path: /v1/health/ready

  # deployment container resource requests/limits
  # this is set VERY low by default, to be aggressive above resource limiting, please override this if necessary
  # Note: Limits are HARD Limits
  #       Requests are "soft" limits and are what affects HPA (autoscaling) aggressiveness if HPA is enabled
  resources:
    limits:
      cpu: 4
      memory: 6Gi
    requests:
      cpu: 2
      memory: 4Gi

  # Enable autoscaling. Async FastAPI: scale via replicas, not workers.
  # Target 65% CPU so HPA reacts before workers saturate.
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 8
    targetCPUUtilizationPercentage: 65
    targetMemoryUtilizationPercentage: 80

  ingress:
    enabled: true
    annotations:
      nginx.ingress.kubernetes.io/proxy-connect-timeout: "1200"
      nginx.ingress.kubernetes.io/proxy-read-timeout: "1200"
      nginx.ingress.kubernetes.io/proxy-send-timeout: "1200"
      nginx.ingress.kubernetes.io/proxy-body-size: 500m
      nginx.ingress.kubernetes.io/enable-cors: "true"
      nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
      nginx.ingress.kubernetes.io/cors-allow-methods: "GET,OPTIONS,PUT,POST,PATCH,DELETE"
      nginx.ingress.kubernetes.io/cors-allow-origin: "http://localhost:3000"
      nginx.ingress.kubernetes.io/cors-allow-headers: >-
        DNT,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,
        Authorization,X-CSRF-Token,Accept,Origin,Access-Control-Allow-Origin,X-File-Name,Set-Cookie,X-User-Id,X-User-Email,
        X-Organization-Id,X-User-Roles,X-Forwarded-User,X-Billing-Period-Start,X-Billing-Period-End
      nginx.ingress.kubernetes.io/cors-max-age: "3600"
      nginx.ingress.kubernetes.io/use-regex: "true"
      nginx.ingress.kubernetes.io/auth-url: "auth-url" # Modify per environment
      nginx.ingress.kubernetes.io/auth-method: "GET"
      nginx.ingress.kubernetes.io/auth-response-headers: >-
        X-Organization-Id,X-User-Id,X-User-Email,X-User-Roles,X-Forwarded-User,X-Billing-Period-Start,X-Billing-Period-End
      nginx.ingress.kubernetes.io/auth-request-headers: "Authorization,Cookie"

  ingress_secondary:
    enabled: true
    annotations:
      nginx.ingress.kubernetes.io/proxy-connect-timeout: "1200"
      nginx.ingress.kubernetes.io/proxy-read-timeout: "1200"
      nginx.ingress.kubernetes.io/proxy-send-timeout: "1200"
      nginx.ingress.kubernetes.io/proxy-body-size: 500m
      nginx.ingress.kubernetes.io/enable-cors: "true"
      nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
      nginx.ingress.kubernetes.io/cors-allow-methods: "GET,OPTIONS,PUT,POST,PATCH,DELETE"
      nginx.ingress.kubernetes.io/cors-allow-origin: "http://localhost:3000"
      nginx.ingress.kubernetes.io/cors-allow-headers: >-
        DNT,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,
        Authorization,X-CSRF-Token,Accept,Origin,Access-Control-Allow-Origin,X-File-Name,Set-Cookie,X-User-Id,X-User-Email,
        X-Organization-Id,X-User-Roles,X-Forwarded-User,X-Billing-Period-Start,X-Billing-Period-End
      nginx.ingress.kubernetes.io/cors-max-age: "3600"
      nginx.ingress.kubernetes.io/use-regex: "true"
      nginx.ingress.kubernetes.io/auth-url: "auth-url" # Modify per environment
      nginx.ingress.kubernetes.io/auth-method: "GET"
      nginx.ingress.kubernetes.io/auth-response-headers: >-
        X-Organization-Id,X-User-Id,X-User-Email,X-User-Roles,X-Forwarded-User,X-Billing-Period-Start,X-Billing-Period-End
      nginx.ingress.kubernetes.io/auth-request-headers: "Authorization,Cookie"

  service:
    targetPort: 9010

  globalEnvs:

    - name: DEPLOYMENT_MODE
      value: "cloud"

    - name: REDIS__HOST
      value: "redis-master"
    - name: REDIS__PORT
      value: "6379"
    - name: REDIS__DB
      value: "0"
    - name: REDIS__CACHE_TTL
      value: "3600"

    # DB settings for sqlalchemy
    - name: DATABASE__URI
      valueFrom:
        secretKeyRef:
          name: minds-db
          key: database_uri

    # OpenAI
    - name: OPENAI__API_KEY
      valueFrom:
        secretKeyRef:
          name: mindsdb-secrets
          key: OPENAI_API_KEY

    # Anthropic
    - name: ANTHROPIC__API_KEY
      valueFrom:
        secretKeyRef:
          name: mindsdb-secrets
          key: ANTHROPIC_API_KEY

    # Anthropic native web-tool versions (required by app_settings.AnthropicSettings,
    # no defaults — version bumps are an explicit config change).
    - name: ANTHROPIC__WEB_SEARCH_TOOL_TYPE
      value: "web_search_20250305"
    - name: ANTHROPIC__WEB_FETCH_TOOL_TYPE
      value: "web_fetch_20250910"
    - name: ANTHROPIC__WEB_FETCH_BETA_HEADER
      value: "web-fetch-2025-09-10"

    # Fireworks.ai (open-source models served via Anthropic-compatible API)
    - name: FIREWORKS__API_KEY
      valueFrom:
        secretKeyRef:
          name: mindsdb-secrets
          key: FIREWORKS_API_KEY

    # Google Gemini
    - name: GEMINI__API_KEY
      valueFrom:
        secretKeyRef:
          name: mindsdb-secrets
          key: GEMINI_API_KEY

    # ====================================
    # STATSIG SETTINGS
    # ====================================

    - name: STATSIG__SDK_KEY
      valueFrom:
        secretKeyRef:
          name: mindsdb-secrets
          key: STATSIG_SDK_KEY

    - name: STATSIG__DISABLE_NETWORK
      value: "false"

    - name: STATSIG__DISABLE_ALL_LOGGING
      value: "false"

    
    # ====================================
    # LANGFUSE SETTINGS
    # ====================================
    
    - name: LANGFUSE_RELEASE
      value: "{{ .Values.global.image.tag }}"

    - name: LANGFUSE_PUBLIC_KEY
      valueFrom:
        secretKeyRef:
          name: mindsdb-secrets
          key: LANGFUSE_PUBLIC_KEY

    - name: LANGFUSE_SECRET_KEY
      valueFrom:
        secretKeyRef:
          name: mindsdb-secrets
          key: LANGFUSE_SECRET_KEY

    - name: LANGFUSE_HOST
      valueFrom:
        secretKeyRef:
          name: mindsdb-secrets
          key: LANGFUSE_HOST

    # ====================================
    # MIND CASTLE SETTINGS
    # ====================================

    - name: MIND_CASTLE__ENCRYPTION_TYPE
      value: "awskms"

    - name: MIND_CASTLE_AWS_USE_ENV_AUTH
      value: "true"

    - name: MIND_CASTLE_AWS_REGION
      value: "us-east-1"

