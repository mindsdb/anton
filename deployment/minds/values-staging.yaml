deployment:
  serviceAccount:
    enabled: true
    annotations:
      # Gives permission to use the mind-castle kms key
      eks.amazonaws.com/role-arn: arn:aws:iam::168681354662:role/minds-20260204203650912200000002
      
  ingress:
    annotations:
      nginx.ingress.kubernetes.io/enable-cors: "true"
      
      # Forward auth configuration using your gateway service
      nginx.ingress.kubernetes.io/auth-url: "http://auth.staging.svc.cluster.local:80/api/v1/authenticate/"
    hosts:
      - host: minds-staging.mdb.ai
        enableMultiPath: true
        paths:
          - path: /
            serviceName: minds
            servicePort: 80
      
      - host: staging.mdb.ai
        enableMultiPath: true
        paths:
          - path: /api/v1/chat
            serviceName: minds
            servicePort: 80
          - path: /api/v1/minds
            serviceName: minds
            servicePort: 80
          - path: /api/v1/datasources
            serviceName: minds
            servicePort: 80
          - path: /api/v1/tree
            serviceName: minds
            servicePort: 80
          - path: /api/v1/conversations
            serviceName: minds
            servicePort: 80
          - path: /api/v1/responses
            serviceName: minds
            servicePort: 80
          - path: /api/v1/limits
            serviceName: minds
            servicePort: 80

  extraEnvs:

    # ====================================
    # GENERAL SETTINGS
    # ====================================

    - name: ENV
      value: "staging"

    # ====================================
    # LANGFUSE SETTINGS
    # ====================================

    - name: LANGFUSE_TRACING_ENVIRONMENT
      value: "staging"

    # ====================================
    # DATA CATALOG SETTINGS
    # ====================================

    - name: DATA_CATALOG__JOB_DEPLOYMENT_NAME
      value: "staging--data-catalog-loader"

    # ====================================
    # MIND CASTLE SETTINGS
    # ====================================

    - name: MIND_CASTLE_AWS_KMS_KEY_ARN
      value: "arn:aws:kms:us-east-1:168681354662:key/679a2faa-925c-4da3-bc27-d4adbdcbcb13"
    
    # ====================================
    # STATSIG SETTINGS
    # ====================================

    - name: STATSIG__ENVIRONMENT
      value: "staging"
          
