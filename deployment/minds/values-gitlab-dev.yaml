deployment:
  serviceAccount:
    enabled: true
    annotations:
      # Gives permission to use the mind-castle kms key
      eks.amazonaws.com/role-arn: arn:aws:iam::168681354662:role/minds-20260204203650912200000002
  
  ingress:
    enabled: true
    name: minds
    annotations:
      nginx.ingress.kubernetes.io/enable-cors: "true"
      nginx.ingress.kubernetes.io/cors-allow-origin: "https://console-gitlab.dev.mindshub.ai, https://gitlab.dev.mdb.ai, https://hub-gitlab.dev.mindsdb.com"
      nginx.ingress.kubernetes.io/auth-url: "http://auth.gitlab-dev.svc.cluster.local:80/v1/authenticate/"
    hosts:
      - host: api-gitlab.dev.mindshub.ai
        enableMultiPath: true
        paths:
          - path: /v1
            serviceName: minds
            servicePort: 80

  ingress_secondary:
    name: minds-legacy
    annotations:
      nginx.ingress.kubernetes.io/enable-cors: "true"
      
      # Forward auth configuration using your gateway service
      nginx.ingress.kubernetes.io/auth-url: "http://auth.gitlab-dev.svc.cluster.local:80/v1/authenticate/"
    hosts:
      - host: minds-gitlab.dev.mdb.ai
        enableMultiPath: true
        paths:
          - path: /
            serviceName: minds
            servicePort: 80
      
      - host: gitlab.dev.mdb.ai
        enableMultiPath: true
        paths:
          - path: /api/v1/chat
            serviceName: minds
            servicePort: 80
          - path: /api/v1/models
            serviceName: minds
            servicePort: 80
          - path: /api/v1/datasources
            serviceName: minds
            servicePort: 80
          - path: /api/v1/tree
            serviceName: minds
            servicePort: 80
          - path: /api/v1/conversations
            serviceName: minds
            servicePort: 80
          - path: /api/v1/responses
            serviceName: minds
            servicePort: 80
          - path: /api/v1/limits
            serviceName: minds
- path: /api/v1/models
serviceName: minds
servicePort: 80
- path: /api/v1/limits
serviceName: minds
servicePort: 80


  extraEnvs:

    # ====================================
    # GENERAL SETTINGS
    # ====================================

    - name: ENV
      value: "gitlab-dev"

    # ====================================
    # LOGGING SETTINGS
    # ====================================

    - name: LOG_LEVEL
      value: "WARNING"

    # ====================================
    # LANGFUSE SETTINGS
    # ====================================

    - name: LANGFUSE_TRACING_ENVIRONMENT
      value: "gitlab-dev"

    # ====================================
    # DATA CATALOG SETTINGS
    # ====================================

    - name: DATA_CATALOG__JOB_DEPLOYMENT_NAME
      value: "gitlab-dev--data-catalog-loader"

    # ====================================
    # MIND CASTLE SETTINGS
    # ====================================

    - name: MIND_CASTLE_AWS_KMS_KEY_ARN
      value: "arn:aws:kms:us-east-1:168681354662:key/679a2faa-925c-4da3-bc27-d4adbdcbcb13"
    
    # ====================================
    # STATSIG SETTINGS
    # ====================================

    - name: STATSIG__ENVIRONMENT
      value: "development"
          