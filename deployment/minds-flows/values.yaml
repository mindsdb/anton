globalEnvsAlias: &globalEnvsYamlAlias
  globalEnvs:

    # ====================================
    # GENERAL SETTINGS
    # ====================================

    - name: LOG_LEVEL
      value: "INFO"
      
    - name: IMAGE_TAG
      value: "{{ .Values.global.image.tag }}"

    - name: DEPLOYMENT_MODE
      value: "cloud"

    # ====================================
    # PREFECT SETTINGS (for ETL flows)
    # ====================================
    - name: PREFECT_API_URL
      value: "http://prefect-server.infrastructure.svc.cluster.local:4200/api"
    
    # ====================================
    # STATSIG SETTINGS
    # ====================================

    - name: STATSIG__SDK_KEY
      valueFrom:
        secretKeyRef:
          name: mindsdb-secrets
          key: STATSIG_SDK_KEY

    - name: STATSIG__DISABLE_NETWORK
      value: "false"

    - name: STATSIG__DISABLE_ALL_LOGGING
      value: "false"
          

    # ====================================
    # LANGFUSE SETTINGS
    # ====================================
    - name: LANGFUSE_PUBLIC_KEY
      valueFrom:
        secretKeyRef:
          name: mindsdb-secrets
          key: LANGFUSE_PUBLIC_KEY

    - name: LANGFUSE_SECRET_KEY
      valueFrom:
        secretKeyRef:
          name: mindsdb-secrets
          key: LANGFUSE_SECRET_KEY

    - name: LANGFUSE_HOST
      valueFrom:
        secretKeyRef:
          name: mindsdb-secrets
          key: LANGFUSE_HOST

    # ====================================
    # DATABASE SETTINGS
    # ====================================

    - name: DATABASE__URI
      valueFrom:
        secretKeyRef:
          name: minds-db
          key: database_uri

    # ====================================
    # REDIS SETTINGS
    # ====================================

    - name: REDIS__HOST
      value: "redis-master"

    - name: REDIS__PORT
      value: "6379"

    - name: REDIS__DB
      value: "0"

    - name: REDIS__CACHE_TTL
      value: "3600"
      
    # ====================================
    # OPENAI SETTINGS
    # ====================================

    - name: OPENAI__API_KEY
      valueFrom:
        secretKeyRef:
          name: mindsdb-secrets
          key: OPENAI_API_KEY

    # ====================================
    # ANTHROPIC SETTINGS
    # ====================================

    - name: ANTHROPIC__API_KEY
      valueFrom:
        secretKeyRef:
          name: mindsdb-secrets
          key: ANTHROPIC_API_KEY

    # Anthropic native web-tool versions (required by app_settings.AnthropicSettings,
    # no defaults — version bumps are an explicit config change). minds-flows runs
    # `prefect deploy` which imports flow entrypoints, which transitively load
    # AppSettings at module import time, so missing values crash the Job pod
    # before Prefect can run. Mirror of deployment/minds/values.yaml.
    - name: ANTHROPIC__WEB_SEARCH_TOOL_TYPE
      value: "web_search_20250305"
    - name: ANTHROPIC__WEB_FETCH_TOOL_TYPE
      value: "web_fetch_20250910"
    - name: ANTHROPIC__WEB_FETCH_BETA_HEADER
      value: "web-fetch-2025-09-10"

    # ====================================
    # MINDSDB SETTINGS
    # ====================================

    - name: MINDSDB__URL
      value: "http://mindsdb:80"

job:
  # Job configuration
  <<: *globalEnvsYamlAlias

  name: minds-flows

  image:
    repository: 168681354662.dkr.ecr.us-east-1.amazonaws.com/mindsdb-minds
    command: ["make"]
    args: ["prefect/deploy/full"]

  # Job timeout (in seconds) - how long the job is allowed to run
  activeDeadlineSeconds: 3600

  # Auto-cleanup completed jobs after 2 hours (7200 seconds)
  ttlSecondsAfterFinished: 7200

  # Resource limits for the job
  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 250m
      memory: 1Gi
