[project]
name = "minds"
version = "1.6.0"
requires-python = ">=3.10,<4.0"
dependencies = [
    "fastapi==0.128.0",
    "pydantic==2.12.5",
    "python-dotenv==1.1.0",
    "pyodbc>=4.0.39",
    "httpx==0.28.1",
    "alembic==1.16.4",
    "sqlmodel==0.0.24",
    "SQLAlchemy==2.0.43",
    "psycopg2-binary==2.9.10",
    "pydantic-ai==1.3.0",
    "mindsdb_sdk @ https://github.com/mindsdb/mindsdb_python_sdk/archive/refs/heads/main.zip",
    "prefect==3.4.18",
]

[build-system]
requires = ["setuptools >= 80.9.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["minds", "minds.*"]

[tool.poetry.dependencies]
python-dotenv = "^1.1.0"
pytest-asyncio = "^1.1.0"
watchfiles = "^1.1.0"
ruff = "^0.12.8"
pytest-cov = "^6.2.1"
pytest = "^8.4.1"

# Pytest

[tool.pytest.ini_options]
addopts = "-q --strict-markers --maxfail=1 --disable-warnings"
testpaths = ["tests"]
markers = ["unit: fast unit tests"]

# Ruff
[tool.ruff.lint]
select = [
    # pycodestyle
    "E",
    # Pyflakes
    "F",
    # pyupgrade
    "UP",
    # flake8-bugbear
    "B",
    # flake8-simplify
    "SIM",
    # isort
    "I",
]
ignore = ["B008"]  # Allow Depends() calls in FastAPI function signatures

[tool.ruff.lint.per-file-ignores]
"alembic/versions/*.py" = ["E501"]
"tests/e2e/evals/*.py" = ["E501"]
"minds/agents/database_agent/prompt_templates.py" = ["E501"]
"minds/agents/helpers/chart_generation_instructions.py" = ["E501"]
"minds/agents/candidate_sql_agent/**/instruction*.py" = ["E501"]
[tool.ruff.lint.pycodestyle]
ignore-overlong-task-comments = true

[tool.ruff]
line-length = 120
