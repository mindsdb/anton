[project]
name = "minds"
version = "1.0.0"
requires-python = ">=3.9,<4.0"
dependencies = [
    "aiohttp>=3.12.13",
    "pytest>=8.4.1",
]

[build-system]
requires = ["setuptools >= 80.9.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.package-dir]
minds = "."

[tool.poetry.dependencies]
python-dotenv = "^1.1.0"
pytest = "^8.4.1"
