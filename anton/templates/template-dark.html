<style>
:root {
  --bg:      #0d1117;
  --bg2:     #161b22;
  --bg3:     #1c2128;
  --border:  #30363d;
  --text:    #e6edf3;
  --muted:   #8b949e;
  --accent:  #58a6ff;  /* blue   */
  --accent2: #f78166;  /* coral  */
  --accent3: #3fb950;  /* green  */
  --accent4: #d29922;  /* yellow */
  --purple:  #bc8cff;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
  padding: 24px;
  max-width: 1440px;
  margin: 0 auto;
  min-height: 100vh;
}

/* Grid — single utility, agent sets --cols inline (default 2) */
.grid { display: grid; gap: 20px; margin-bottom: 24px;
        grid-template-columns: repeat(var(--cols, 2), minmax(0, 1fr)); }
.col-span-2 { grid-column: span 2; }

/* Card */
.card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 24px; }
.card-title { font-size: 0.75rem; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }
.card h2 { font-size: 1.1rem; font-weight: 600; color: var(--text); margin-bottom: 16px; }

/* KPI — use --c for accent color, e.g. style="--c: var(--accent3)" */
.kpi { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 20px; text-align: center; --c: var(--accent); }
.kpi .kpi-value { font-size: 1.9rem; font-weight: 700; line-height: 1; margin-bottom: 4px; color: var(--c); }
.kpi .kpi-label { font-size: 0.75rem; color: var(--muted); letter-spacing: 0.5px; }

/* Tags — use --c for color, e.g. <span class="tag" style="--c: var(--accent3)"> */
.tag { display: inline-block; font-size: 0.7rem; font-weight: 600; padding: 2px 8px; border-radius: 4px;
       --c: var(--accent);
       color: var(--c);
       background: color-mix(in oklab, var(--c) 15%, transparent);
       border: 1px solid color-mix(in oklab, var(--c) 30%, transparent); }

/* Tables */
.data-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
.data-table th { background: var(--bg3); color: var(--muted); font-size: 0.7rem; letter-spacing: 1px; text-transform: uppercase; padding: 10px 14px; text-align: left; border-bottom: 2px solid var(--border); }
.data-table td { padding: 10px 14px; border-bottom: 1px solid var(--border); vertical-align: top; }
.data-table tr:last-child td { border-bottom: none; }
.data-table tr:hover td { background: var(--bg3); }

/* Chart containers */
.chart-container    { width: 100%; height: 320px; }
.chart-container-lg { width: 100%; height: 380px; }

/* Callouts */
.insight-box { background: rgba(88,166,255,0.06); border: 1px solid rgba(88,166,255,0.2); border-left: 3px solid var(--accent); border-radius: 8px; padding: 14px 18px; margin-top: 16px; }
.insight-box p { font-size: 0.83rem; color: var(--text); line-height: 1.6; }

/* Section */
section { margin-bottom: 32px; }
section > .section-title { font-size: 0.75rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); padding-bottom: 12px; border-bottom: 1px solid var(--border); margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
section > .section-title::before { content: ''; display: inline-block; width: 3px; height: 14px; background: var(--accent); border-radius: 2px; }

/* Responsive */
@media (max-width: 900px) {
  .grid { grid-template-columns: 1fr; }
  .col-span-2 { grid-column: span 1; }
}

<script>
const githubDarkTheme = {
  color: ['#58a6ff', '#3fb950', '#d29922', '#f78166', '#bc8cff',
          '#79c0ff', '#ff7b72', '#e3b341', '#a5d6ff', '#56d364'],

  line:    { itemStyle: { borderWidth: 0 }, lineStyle: { width: 2 }, symbol: 'none', smooth: false },

  candlestick: { itemStyle: { color: '#3fb950', color0: '#f85149', borderColor: '#3fb950', borderColor0: '#f85149', borderWidth: 1 } },
  graph:   { itemStyle: { borderWidth: 0 }, lineStyle: { color: '#30363d', width: 1 },

             label: { color: '#e6edf3' } },
  gauge:   { title: { color: '#e6edf3' }, detail: { color: '#e6edf3' } },
  funnel:  { itemStyle: { borderColor: '#0d1117', borderWidth: 1 } },
  sankey:  { itemStyle: { borderWidth: 0 }, lineStyle: { color: 'source', opacity: 0.4 } },

  categoryAxis: {
    axisLine:  { show: true, lineStyle: { color: '#30363d' } },
    axisTick:  { show: false },

  },
  valueAxis: {

    splitLine: { show: true, lineStyle: { color: '#21262d' } },
    splitArea: { show: false }
  },
  logAxis: {

    axisLabel: { show: true, color: '#8b949e' },

  },
  timeAxis: {
    axisLine:  { show: true, lineStyle: { color: '#30363d' } },
    axisLabel: { show: true, color: '#8b949e' },
    splitLine: { show: true, lineStyle: { color: '#21262d' } }
  },

  legend:  { textStyle: { color: '#8b949e' }, inactiveColor: '#484f58',
             itemStyle: { borderColor: 'transparent' } },
  tooltip: { backgroundColor: '#1c2128', borderColor: '#30363d', borderWidth: 1,
             textStyle: { color: '#e6edf3' },
             axisPointer: {

               crossStyle: { color: '#58a6ff', width: 1 },
               shadowStyle:{ color: 'rgba(88,166,255,0.08)' },
               label: { backgroundColor: '#1c2128', color: '#e6edf3' }
             } },
  toolbox: { iconStyle: { borderColor: '#8b949e' },
             emphasis: { iconStyle: { borderColor: '#58a6ff' } } },
  timeline: { lineStyle: { color: '#30363d', width: 1 },
              itemStyle: { color: '#58a6ff' },
              controlStyle: { color: '#58a6ff', borderColor: '#58a6ff' },
              checkpointStyle: { color: '#58a6ff', borderColor: '#0d1117' },
              label: { color: '#8b949e' },
              emphasis: { itemStyle: { color: '#79c0ff' }, label: { color: '#e6edf3' } } },
  visualMap: { color: ['#58a6ff', '#3fb950', '#d29922', '#f78166'],
               textStyle: { color: '#8b949e' } },
  dataZoom:  { backgroundColor: 'rgba(28,33,40,0.5)',
               dataBackgroundColor: 'rgba(88,166,255,0.15)',
               fillerColor: 'rgba(88,166,255,0.12)',
               handleColor: '#58a6ff', handleSize: '100%',
               borderColor: '#30363d',
               textStyle: { color: '#8b949e' } },
  markPoint: { symbol: 'roundRect', symbolSize: [60, 22],
               itemStyle: { borderColor: '#30363d', borderWidth: 1 },
               label: { position: 'inside', color: '#e6edf3', fontSize: 11, fontWeight: 600,
                        textBorderColor: 'transparent', textBorderWidth: 0 },
               emphasis: { label: { color: '#e6edf3' } } },
  markLine:  { symbol: ['none', 'none'],
               lineStyle: { color: '#8b949e', type: 'dashed', width: 1 },
               label: { position: 'insideEndTop', color: '#e6edf3', fontSize: 11,
                        textBorderColor: 'transparent', textBorderWidth: 0,
                        backgroundColor: 'rgba(28,33,40,0.85)',
                        padding: [3, 6], borderRadius: 3 },
               emphasis: { label: { color: '#e6edf3' } } }
};
echarts.registerTheme('github-dark', githubDarkTheme);

const __charts = [];
function initChart(id, options) {
  const el = document.getElementById(id);
  if (!el) { console.warn('initChart: element not found:', id); return null; }
  const chart = echarts.init(el, 'github-dark');
  chart.setOption(options);
  __charts.push(chart);
  return chart;
}

/* Debounced resize via ResizeObserver — reacts to layout changes, not just window resize */
let __resizeTimer;
const __resizeAll = () => {
  clearTimeout(__resizeTimer);
  __resizeTimer = setTimeout(() => __charts.forEach(c => c.resize()), 80);
};
window.addEventListener('resize', __resizeAll);
if (window.ResizeObserver) {
  const __ro = new ResizeObserver(__resizeAll);
  __ro.observe(document.body);
}
