<script>
tailwind.config = {
  darkMode: 'class',
  theme: {
    extend: {
      colors: {
        surface: {
          0: 'var(--surface-0)',
          '0h': 'var(--surface-0-hover)',
          '0a': 'var(--surface-0-active)',
          '01': 'var(--surface-01)',
          '01h': 'var(--surface-01-hover)',
          '01a': 'var(--surface-01-active)',
          '02': 'var(--surface-02)',
          '02h': 'var(--surface-02-hover)',
          '02a': 'var(--surface-02-active)',
          '03': 'var(--surface-03)',
        },
        border: {
          0: 'var(--border-0)',
          '01': 'var(--border-01)',
          '02': 'var(--border-02)',
          '03': 'var(--border-03)',
          '04': 'var(--border-04)',
        },
        txt: {
          title: 'var(--text-title)',
          primary: 'var(--text-primary)',
          strong: 'var(--text-strong)',
          faint: 'var(--text-faint)',
          disabled: 'var(--text-disabled)',
        },
        error: 'rgb(var(--error-0))',
        success: 'rgb(var(--success-0))',
        warning: 'rgb(var(--warning-0))',
      },
    },
  },
}
</script>

<!-- React + Babel (client-side JSX compilation) -->

<!-- Apache ECharts -->

<script src="https://cdn.jsdelivr.net/npm/lucide@0.344.0/dist/umd/lucide.min.js"></script>
</head>
<body class="bg-surface-0 text-txt-primary min-h-screen">

<div id="root"></div>

<!-- Dashboard data (injected by Anton scratchpad) -->
<script src="{{DATA_FILE}}"></script>

<!-- Dashboard app (injected by Anton scratchpad) -->
<script type="text/babel">
const { useState, useEffect, useRef, useMemo } = React;

// --- Reusable components matching mdb-ai design ---

function Card({ children, className = '' }) {
  return (
    <div className={`bg-surface-01 border border-border-01 rounded-lg p-6 ${className}`}>
      {children}
    </div>
  );
}

function KPI({ title, value, delta, deltaType }) {
  const color = deltaType === 'positive' ? 'text-success' :
                deltaType === 'negative' ? 'text-error' : 'text-txt-faint';
  const arrow = deltaType === 'positive' ? '\u2191' :
                deltaType === 'negative' ? '\u2193' : '';
  return (
    <Card>
      <p className="text-sm text-txt-faint mb-1">{title}</p>
      <p className="text-3xl font-bold text-txt-title">{value}</p>
      {delta && <p className={`text-sm mt-1 ${color}`}>{arrow} {delta}</p>}
    </Card>
  );
}

function EChart({ id, title, subtitle, height = 400, option }) {
  const containerRef = useRef(null);
  const chartRef = useRef(null);

  useEffect(() => {
    if (!containerRef.current || !option) return;
    if (chartRef.current) chartRef.current.dispose();

    const chart = echarts.init(containerRef.current, 'dark');

    // Apply default dark background to match our design tokens
    const mergedOption = {
      backgroundColor: 'transparent',
      ...option,
    };

    chart.setOption(mergedOption);
    chartRef.current = chart;

    const handleResize = () => chart.resize();
    window.addEventListener('resize', handleResize);

    return () => {
      window.removeEventListener('resize', handleResize);
      chart.dispose();
    };
  }, [option]);

  return (
    <Card>
      {title && <h3 className="text-lg font-semibold text-txt-title mb-1">{title}</h3>}
      {subtitle && <p className="text-sm text-txt-faint mb-4">{subtitle}</p>}
      <div ref={containerRef} style={{ height, width: '100%' }} />
    </Card>
  );
}

function DataTable({ columns, rows, title }) {
  return (
    <Card>
      {title && <h3 className="text-lg font-semibold text-txt-title mb-4">{title}</h3>}
      <div className="overflow-x-auto">
        <table className="w-full text-sm">
          <thead>
            <tr className="border-b border-border-02">
              {columns.map((col, i) => (
                <th key={i} className="text-left py-2 px-3 text-txt-faint font-medium">{col}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {rows.map((row, i) => (
              <tr key={i} className="border-b border-border-0 hover:bg-surface-0h">
                {columns.map((col, j) => (
                  <td key={j} className="py-2 px-3 text-txt-primary">{row[col] ?? row[j] ?? ''}</td>
                ))}
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </Card>
  );
}

function Grid({ cols = 2, gap = 6, children }) {
  return (
    <div className={`grid grid-cols-1 md:grid-cols-${cols} gap-${gap}`}>
      {children}
    </div>
  );
}

function Section({ title, children }) {
  return (
    <div className="mb-8">
      {title && <h2 className="text-xl font-bold text-txt-title mb-4">{title}</h2>}
      {children}
    </div>
  );
}

// --- Mount point: LLM writes App() below this line ---
{{APP_COMPONENT}}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
