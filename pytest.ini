[pytest]
filterwarnings =
    ignore::DeprecationWarning:faiss.*
    ignore::DeprecationWarning:numpy.*
    ignore:.*numpy.core._multiarray_umath is deprecated.*:DeprecationWarning
    ignore:.*builtin type SwigPyPacked has no __module__ attribute.*:DeprecationWarning
    ignore:.*builtin type SwigPyObject has no __module__ attribute.*:DeprecationWarning
    ignore:.*builtin type swigvarlink has no __module__ attribute.*:DeprecationWarning
    ignore:.*Unexpected error occurred.*:UserWarning
    ignore:.*asyncio_default_fixture_loop_scope.*:pytest.PytestDeprecationWarning
    ignore:.*coroutine.*was never awaited.*:RuntimeWarning
addopts = --tb=short
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
markers =
    asyncio: marks tests as async (deselect with '-m "not asyncio"') 
    happy_path: Marks tests as part of the primary success workflow.
