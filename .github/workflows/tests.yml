name: Tests

on:
  workflow_call:

defaults:
  run:
    shell: bash

jobs:
  unit-tests:
    runs-on: mdb-dev
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.4'
      - name: Run unit tests
        run: make test/unit/coverage

  integration-tests:
    runs-on: mdb-dev
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.4'
      - name: Run integration tests
        run: make test/integration
