name: Prod - Build and Deploy on release

on:
  release:
    types: [published]
  workflow_dispatch:

defaults:
  run:
    shell: bash

# Cancel any existing runs of this workflow on the same branch/pr
# We always want to build/deploy/test a new commit over an older one
concurrency:
  group: ${{ github.workflow_ref }}
  cancel-in-progress: true

jobs:

  linter:
    # Runs linter
    uses: ./.github/workflows/linter.yml

  run-unit-tests:
    # Runs unit tests
    uses: ./.github/workflows/tests-unit.yml

  build:
    runs-on: mdb-dev
    needs: [run-unit-tests, linter]
    outputs:
      image: ${{ steps.build.outputs.image }}
    env:
      AWS_REGION: us-east-1
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
      - name: Pull MindsDB Github Actions
        uses: actions/checkout@v4
        with:
          repository: mindsdb/github-actions
          path: github-actions
      - uses: ./github-actions/setup-env
      - id: build
        uses: ./github-actions/build-push-ecr
        with:
          module-name: ${{ env.CI_REPOSITORY_SLUG }}
          build-for-environment: production
          image-ref: ${{ env.CI_REF_SLUG }}

  scan:
    runs-on: mdb-dev
    needs: [ build ]
    name: Scan Minds Image
    steps:
      - uses: actions/checkout@v4
      - uses: mindsdb/github-actions/snyk-docker-scan@main
        with:
          image: ${{ needs.build.outputs.image }}
          snyk-token: ${{ secrets.SNYK_TOKEN }}
          
  migrate:
    runs-on: mdb-prod
    needs: [ build ]
    environment:
      name: prod
      url: ${{ vars.MDB_ENV_URL }}
    # We only want to run one deploy job for an env at a time
    # Don't cancel in progress jobs because it may be for a different PR
    concurrency:
      group: deploy-${{ matrix.deploy-env }}
      cancel-in-progress: false
    env:
      DATABASE__URI: ${{ secrets.MINDS_DB_URI }}
      UV_LINK_MODE: "symlink"
      MIND_CASTLE__ENCRYPTION_TYPE: awskms
      MIND_CASTLE_AWS_USE_ENV_AUTH: true
      MIND_CASTLE_AWS_REGION: us-east-1
      MIND_CASTLE_AWS_KMS_KEY_ARN: "arn:aws:kms:us-east-1:065786718370:key/1787cc0e-18e5-4c7d-af9f-6f9f01b06f17"
      # AnthropicSettings requires these explicitly (no defaults). alembic's
      # env.py imports SQLModel models which transitively load AppSettings, so
      # missing values fail validation before migrations run. Mirror of the
      # deployment Helm chart values in deployment/minds/values.yaml.
      ANTHROPIC__WEB_SEARCH_TOOL_TYPE: web_search_20250305
      ANTHROPIC__WEB_FETCH_TOOL_TYPE: web_fetch_20250910
      ANTHROPIC__WEB_FETCH_BETA_HEADER: web-fetch-2025-09-10

    steps:
      - uses: actions/checkout@v4
      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          # Place cache in the tool dir because we mount this in our runnners
          cache-local-path: "/home/runner/_work/_tool/uv-local-cache"
          prune-cache: false
          python-version: ${{ vars.CI_PYTHON_VERSION || '3.13' }}
      - name: Install dependencies
        run: |
          uv pip install --prerelease=allow -r requirements/requirements.txt
      - name: Migrate Database
        run: |
          env PYTHONPATH=../../ alembic upgrade head

  deploy:
    runs-on: mdb-prod
    needs: [build, migrate]
    environment:
      name: prod
      url: ${{ vars.MDB_ENV_URL }}
    steps:
      - uses: actions/checkout@v4
      - name: Pull MindsDB Github Actions
        uses: actions/checkout@v4
        with:
          repository: mindsdb/github-actions
          path: github-actions
      - uses: ./github-actions/setup-env
      - name: Notify of deployment starting
        id: slack
        uses: ./github-actions/slack-deploy-msg
        with:
          channel-id: ${{ secrets.SLACK_DEPLOYMENTS_CHANNEL_ID }}
          status: "started"
          color: "#0099CC"
          env-name: "prod"
          env-url: ${{ vars.MDB_ENV_URL }}
          slack-token: ${{ secrets.GH_ACTIONS_SLACK_BOT_TOKEN }}
      - uses: DevOps-Nirvana/aws-helm-multi-deploy-nodocker@v6
        with:
          environment-slug: prod
          k8s-namespace: prod
          image-tag: production-${{ env.CI_REF_SLUG }}
          timeout: 600s
          wait: "true"  # We need to wait till deployment is finished here, since we're going to test the deployment env
      - name: Wait for Deployment to be ready
        run: |
          export NAMESPACE=prod
          kubectl -n $NAMESPACE wait --for=condition=ready --timeout=10m pod -l app=minds
      - name: Notify of deployment finish
        uses: ./github-actions/slack-deploy-msg
        if: always()
        with:
          channel-id: ${{ secrets.SLACK_DEPLOYMENTS_CHANNEL_ID }}
          status: "${{ job.status == 'success' && 'finished' || 'failed' }}"
          color: "${{ job.status == 'success' && '#00C851' || '#FF4444' }}"
          env-name: "prod"
          env-url: ${{ vars.MDB_ENV_URL }}
          slack-token: ${{ secrets.GH_ACTIONS_SLACK_BOT_TOKEN }}
          update-message-id: ${{ steps.slack.outputs.ts }}

  integration-tests:
    needs: [ deploy ]
    uses: ./.github/workflows/tests-integration.yml
    with:
      deploy-env: prod
      runs-on: mdb-prod
    secrets: inherit

