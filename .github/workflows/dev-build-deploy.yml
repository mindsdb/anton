name: Dev - Build and Deploy on PR

on:
  pull_request:
    types: [opened, reopened, synchronize, labeled]

defaults:
  run:
    shell: bash

# Cancel any existing runs of this workflow on the same branch/pr
# We always want to build/deploy/test a new commit over an older one
concurrency:
  group: ${{ github.workflow_ref }}
  cancel-in-progress: true

jobs:

  linter:
    # Runs linter
    uses: ./.github/workflows/linter.yml

  # Runs unit tests
  unit-tests:
    runs-on: mdb-dev
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.4'
      - name: Run unit tests
        run: make test/unit/coverage

  # Looks for labels like "deploy-to-<env>" attached to a PR, so we can deploy to those envs
  get-deploy-labels:
    runs-on: mdb-dev
    outputs:
      deploy-envs: ${{ steps.get-labels.outputs.deploy-envs }}
    steps:
      - name: Pull MindsDB Github Actions
        uses: actions/checkout@v4
        with:
          repository: mindsdb/github-actions
          path: github-actions
      - id: get-labels
        uses: ./github-actions/get-deploy-labels

  build:
    runs-on: mdb-dev
    needs: [unit-tests, get-deploy-labels]
    if: needs.get-deploy-labels.outputs.deploy-envs != '[]'
    env:
      AWS_REGION: us-east-1
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
      - name: Pull MindsDB Github Actions
        uses: actions/checkout@v4
        with:
          repository: mindsdb/github-actions
          path: github-actions
      - uses: ./github-actions/setup-env
      - uses: ./github-actions/build-push-ecr
        with:
          module-name: ${{ env.CI_REPOSITORY_SLUG }}
          build-for-environment: development

  migrate:
    runs-on: mdb-dev
    needs: [ get-deploy-labels, build ]
    strategy:
      fail-fast: false
      matrix:
        deploy-env: ${{fromJson(needs.get-deploy-labels.outputs.deploy-envs)}}
    environment:
      name: ${{ matrix.deploy-env }}
      url: ${{ vars.MDB_ENV_URL }}
    # We only want to run one deploy job for an env at a time
    # Don't cancel in progress jobs because it may be for a different PR
    concurrency:
      group: deploy-${{ matrix.deploy-env }}
      cancel-in-progress: false
    env:
      DATABASE_URI: ${{ secrets.MINDS_DB_URI }}
      UV_LINK_MODE: "symlink"
    steps:
      - uses: actions/checkout@v4
      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          # Place cache in the tool dir because we mount this in our runnners
          cache-local-path: "/home/runner/_work/_tool/uv-local-cache"
          prune-cache: false
          python-version: ${{ vars.CI_PYTHON_VERSION || '3.13' }}
      - name: Install dependencies
        run: |
          uv pip install --prerelease=allow -r requirements/requirements.txt
      - name: Migrate Database
        run: |
          env PYTHONPATH=../../ alembic upgrade head

  deploy:
    runs-on: mdb-dev
    needs: [ get-deploy-labels, migrate ]
    strategy:
      matrix:
        deploy-env: ${{fromJson(needs.get-deploy-labels.outputs.deploy-envs)}}
    environment:
      name: ${{ matrix.deploy-env }}
      url: ${{ vars.MDB_ENV_URL }}
    # We only want to run one deploy job for an env at a time
    # Don't cancel in progress jobs because it may be for a different PR
    concurrency:
      group: deploy-${{ matrix.deploy-env }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - name: Pull MindsDB Github Actions
        uses: actions/checkout@v4
        with:
          repository: mindsdb/github-actions
          path: github-actions
      - uses: ./github-actions/setup-env
      - name: Update IMAGE_TAG in values.yaml
        run: |
          # Install yq if not available
          if ! command -v yq &> /dev/null; then
            sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
            sudo chmod +x /usr/local/bin/yq
          fi
          # Update IMAGE_TAG environment variable value
          yq -i '(.globalEnvsAlias.globalEnvs[] | select(.name == "IMAGE_TAG") | .value) = "development-${{ env.SLUG }}"' deployment/minds-flows/values.yaml
          cat deployment/minds-flows/values.yaml
      - name: Notify of deployment starting
        id: slack
        uses: ./github-actions/slack-deploy-msg
        with:
          channel-id: ${{ secrets.SLACK_DEPLOYMENTS_CHANNEL_ID }}
          status: "started"
          color: "#0099CC"
          env-name: ${{ matrix.deploy-env }}
          env-url: ${{ vars.MDB_ENV_URL }}
          slack-token: ${{ secrets.GH_ACTIONS_SLACK_BOT_TOKEN }}
      - uses: DevOps-Nirvana/aws-helm-multi-deploy-nodocker@v4
        with:
          environment-slug: ${{matrix.deploy-env}}
          k8s-namespace: ${{matrix.deploy-env}}
          image-tag: development-${{ env.SLUG }}
          timeout: 600s
          wait: "true"  # We need to wait till deployment is finished here, since we're going to test the deployment env
      - name: Notify of deployment finish
        uses: ./github-actions/slack-deploy-msg
        if: always()
        with:
          channel-id: ${{ secrets.SLACK_DEPLOYMENTS_CHANNEL_ID }}
          status: "${{ job.status == 'success' && 'finished' || 'failed' }}"
          color: "${{ job.status == 'success' && '#00C851' || '#FF4444' }}"
          env-name: ${{ matrix.deploy-env }}
          env-url: ${{ vars.MDB_ENV_URL }}
          slack-token: ${{ secrets.GH_ACTIONS_SLACK_BOT_TOKEN }}
          update-message-id: ${{ steps.slack.outputs.ts }}

  integration-tests:
    runs-on: mdb-dev
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.4'
      - name: Run integration tests
        run: |
          make test/integration
        env:
          MINDS_API_BASE_URL: ${{ vars.MDB_ENV_URL }}

  run-evals:
    runs-on: mdb-dev
    needs: [ get-deploy-labels, deploy ]
    strategy:
      matrix:
        deploy-env: ${{fromJson(needs.get-deploy-labels.outputs.deploy-envs)}}
    environment:
      name: ${{ matrix.deploy-env }}
      url: ${{ vars.MDB_ENV_URL }}
    # We want other deployments to wait while we test
    # Don't cancel in progress jobs because it may be for a different PR
    concurrency:
      group: deploy-${{ matrix.deploy-env }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - name: Run evals
        run: |
          export NAMESPACE=${{matrix.deploy-env}}
          export MINDS_BASE_URL=${{vars.MINDS_V3_ENV_URL}}
          export PR_NUMBER=${{github.event.pull_request.number}}

          kubectl -n $NAMESPACE delete job --ignore-not-found minds-langfuse-benchmarks
          envsubst '${PR_NUMBER} ${NAMESPACE} ${MINDS_BASE_URL}' < deployment/eval-job.yaml | kubectl apply -f -

          echo "Waiting for eval job to start..."
          kubectl -n $NAMESPACE wait --for=condition=Ready --timeout=5m pod -l job-name=minds-langfuse-benchmarks
          kubectl -n $NAMESPACE logs -f job/minds-langfuse-benchmarks || true

          # Pod should already be complete but just in case
          kubectl -n "$NAMESPACE" wait --for=condition=complete --timeout=1m "job/minds-langfuse-benchmarks"

          # Read completion state
          IS_COMPLETE=$(kubectl -n "$NAMESPACE" get job minds-langfuse-benchmarks -o jsonpath='{range .status.conditions[?(@.type=="Complete")]}{.status}{end}')
          IS_FAILED=$(kubectl -n "$NAMESPACE" get job minds-langfuse-benchmarks -o jsonpath='{range .status.conditions[?(@.type=="Failed")]}{.status}{end}')

          if [[ "$IS_COMPLETE" == "True" ]]; then
            echo "Job completed successfully."
            exit 0
          elif [[ "$IS_FAILED" == "True" ]]; then
            echo "Job failed."
            exit 1
          else
            echo "Job neither reported Complete nor Failed (likely timeout)."
            kubectl -n "$NAMESPACE" get job minds-langfuse-benchmarks -o yaml || true
            exit 1
          fi

