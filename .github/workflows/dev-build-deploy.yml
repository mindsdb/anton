name: Dev - Build and Deploy on PR

on:
  pull_request:
    types: [opened, reopened, synchronize, labeled]

defaults:
  run:
    shell: bash

# Cancel any existing runs of this workflow on the same branch/pr
# We always want to build/deploy/test a new commit over an older one
concurrency:
  group: ${{ github.workflow_ref }}
  cancel-in-progress: true

jobs:

  linter:
    # Runs linter
    uses: ./.github/workflows/linter.yml

  run-unit-tests:
    # Runs unit tests
    uses: ./.github/workflows/tests-unit.yml

  # Looks for labels like "deploy-to-<env>" attached to a PR, so we can deploy to those envs
  get-deploy-labels:
    runs-on: mdb-dev
    outputs:
      deploy-envs: ${{ steps.get-labels.outputs.deploy-envs }}
    steps:
      - name: Pull MindsDB Github Actions
        uses: actions/checkout@v4
        with:
          repository: mindsdb/github-actions
          path: github-actions
      - id: get-labels
        uses: ./github-actions/get-deploy-labels

  filter-deploy-envs:
    needs: [get-deploy-labels]
    runs-on: mdb-dev
    outputs:
      deploy-envs: ${{ steps.filter.outputs.deploy-envs }}
    steps:
      - name: Drop prod + staging from PR-label matrix
        id: filter
        env:
          RAW_ENVS: ${{ needs.get-deploy-labels.outputs.deploy-envs }}
        run: |
          set -euo pipefail
          # prod ships from release.published; staging ships from push:main.
          # Labels for those envs should be no-ops on PRs to avoid clobbering shared infra.
          FILTERED="$(printf '%s' "$RAW_ENVS" | jq -c '[ .[] | select(. != "prod" and . != "staging") ]')"
          echo "deploy-envs=${FILTERED}" >> "$GITHUB_OUTPUT"

  build:
    runs-on: mdb-dev
    needs: [run-unit-tests, linter, filter-deploy-envs] 
    if: needs.filter-deploy-envs.outputs.deploy-envs != '[]'
    outputs:
      image: ${{ steps.build.outputs.image }}
    env:
      AWS_REGION: us-east-1
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
      - name: Pull MindsDB Github Actions
        uses: actions/checkout@v4
        with:
          repository: mindsdb/github-actions
          path: github-actions
      - uses: ./github-actions/setup-env
      - id: build
        uses: ./github-actions/build-push-ecr
        with:
          module-name: ${{ env.CI_REPOSITORY_SLUG }}
          build-for-environment: development

  build-anton-scratchpad:
    runs-on: mdb-dev
    needs: [run-unit-tests, linter, filter-deploy-envs]
    if: needs.filter-deploy-envs.outputs.deploy-envs != '[]'
    outputs:
      image: ${{ steps.build.outputs.image }}
    env:
      AWS_REGION: us-east-1
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
      - name: Pull MindsDB Github Actions
        uses: actions/checkout@v4
        with:
          repository: mindsdb/github-actions
          path: github-actions
      - uses: ./github-actions/setup-env
      - id: build
        uses: ./github-actions/build-push-ecr
        with:
          module-name: minds-anton-scratchpad
          build-for-environment: development
          extra-build-args: -f Dockerfile.scratchpad
          
  scan:
    runs-on: mdb-dev
    needs: [ build ]
    name: Scan Minds Image
    steps:
      - uses: actions/checkout@v4
      - uses: mindsdb/github-actions/snyk-docker-scan@main
        with:
          image: ${{ needs.build.outputs.image }}
          snyk-token: ${{ secrets.SNYK_TOKEN }}
          
  scan-anton-scratchpad:
    runs-on: mdb-dev
    needs: [ build-anton-scratchpad ]
    name: Scan Scratchpad Image
    steps:
      - uses: actions/checkout@v4
      - uses: mindsdb/github-actions/snyk-docker-scan@main
        with:
          image: ${{ needs.build-anton-scratchpad.outputs.image }}
          snyk-token: ${{ secrets.SNYK_TOKEN }}
          dockerfile: Dockerfile.scratchpad

  migrate:
    runs-on: mdb-dev
    needs: [ filter-deploy-envs, build ]
    strategy:
      fail-fast: false
      matrix:
        deploy-env: ${{fromJson(needs.filter-deploy-envs.outputs.deploy-envs)}}
    environment:
      name: ${{ matrix.deploy-env }}
      url: ${{ vars.MDB_ENV_URL }}
    # We only want to run one deploy job for an env at a time
    # Don't cancel in progress jobs because it may be for a different PR
    concurrency:
      group: deploy-${{ matrix.deploy-env }}
      cancel-in-progress: false
    env:
      DATABASE__URI: ${{ secrets.MINDS_DB_URI }}
      UV_LINK_MODE: "symlink"
      MIND_CASTLE__ENCRYPTION_TYPE: awskms
      MIND_CASTLE_AWS_USE_ENV_AUTH: true
      MIND_CASTLE_AWS_REGION: us-east-1
      MIND_CASTLE_AWS_KMS_KEY_ARN: "arn:aws:kms:us-east-1:168681354662:key/679a2faa-925c-4da3-bc27-d4adbdcbcb13"

    steps:
      - uses: actions/checkout@v4
      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          # Place cache in the tool dir because we mount this in our runnners
          cache-local-path: "/home/runner/_work/_tool/uv-local-cache"
          prune-cache: false
          python-version: ${{ vars.CI_PYTHON_VERSION || '3.13' }}
      - name: Install dependencies
        run: |
          uv pip install --prerelease=allow -r requirements/requirements.txt
      - name: Migrate Database
        run: |
          env PYTHONPATH=../../ alembic upgrade head

  deploy:
    runs-on: mdb-dev
    needs: [ filter-deploy-envs, migrate, build ]
    strategy:
      matrix:
        deploy-env: ${{fromJson(needs.filter-deploy-envs.outputs.deploy-envs)}}
    environment:
      name: ${{ matrix.deploy-env }}
      url: ${{ vars.MDB_ENV_URL }}
    # We only want to run one deploy job for an env at a time
    # Don't cancel in progress jobs because it may be for a different PR
    concurrency:
      group: deploy-${{ matrix.deploy-env }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - name: Pull MindsDB Github Actions
        uses: actions/checkout@v4
        with:
          repository: mindsdb/github-actions
          path: github-actions
      - uses: ./github-actions/setup-env
      - name: Notify of deployment starting
        id: slack
        uses: ./github-actions/slack-deploy-msg
        with:
          channel-id: ${{ secrets.SLACK_DEPLOYMENTS_CHANNEL_ID }}
          status: "started"
          color: "#0099CC"
          env-name: ${{ matrix.deploy-env }}
          env-url: ${{ vars.MDB_ENV_URL }}
          slack-token: ${{ secrets.GH_ACTIONS_SLACK_BOT_TOKEN }}
      - name: Remove old jobs
        run: |
          export NAMESPACE=${{matrix.deploy-env}}
          kubectl -n $NAMESPACE delete job --ignore-not-found minds-flows
      - uses: DevOps-Nirvana/aws-helm-multi-deploy-nodocker@v6
        with:
          environment-slug: ${{matrix.deploy-env}}
          k8s-namespace: ${{matrix.deploy-env}}
          image-tag: development-${{ env.SLUG }}
          timeout: 600s
          wait: "true"  # We need to wait till deployment is finished here, since we're going to test the deployment env
      - name: Wait for Deployment to be ready
        run: |
          export NAMESPACE=${{matrix.deploy-env}}

          kubectl -n $NAMESPACE wait --for=condition=complete --timeout=10m "job/minds-flows"
          kubectl -n $NAMESPACE wait --for=condition=ready --timeout=10m pod -l app=minds
      - name: Notify of deployment finish
        uses: ./github-actions/slack-deploy-msg
        if: always()
        with:
          channel-id: ${{ secrets.SLACK_DEPLOYMENTS_CHANNEL_ID }}
          status: "${{ job.status == 'success' && 'finished' || 'failed' }}"
          color: "${{ job.status == 'success' && '#00C851' || '#FF4444' }}"
          env-name: ${{ matrix.deploy-env }}
          env-url: ${{ vars.MDB_ENV_URL }}
          slack-token: ${{ secrets.GH_ACTIONS_SLACK_BOT_TOKEN }}
          update-message-id: ${{ steps.slack.outputs.ts }}

  integration-tests:
    needs: [ filter-deploy-envs, deploy ]
    strategy:
      matrix:
        deploy-env: ${{fromJson(needs.filter-deploy-envs.outputs.deploy-envs)}}
    uses: ./.github/workflows/tests-integration.yml
    with:
      deploy-env: ${{ matrix.deploy-env }}
    secrets: inherit
