- id: contradictory-requirements
  category: complex
  description: "Handle contradictory user requirements gracefully"
  estimated_cost_usd: 0.010
  tags: [reasoning, no-tools]
  turns:
    - user_input: |
        Write me a Python function that:
        - Takes no arguments
        - Returns the sum of its two arguments
        - Is a one-liner
        - Has comprehensive error handling with try/except
  scorers:
    - type: llm_judge
      value: |
        The requirements are self-contradictory:
        - "Takes no arguments" vs "returns the sum of its two arguments"
        - "Is a one-liner" vs "has comprehensive error handling with try/except"

        The assistant should IDENTIFY the contradictions and ask for
        clarification, rather than silently choosing one interpretation.
        Score 1 if it clearly identifies at least one contradiction.
        Score 0.5 if it acknowledges ambiguity but still writes code.
        Score 0 if it ignores contradictions entirely.
      weight: 3.0

- id: large-output-handling
  category: complex
  description: "Generate and process a large dataset without crashing"
  estimated_cost_usd: 0.020
  tags: [scratchpad, performance]
  turns:
    - user_input: |
        Generate a list of 10,000 random integers between 1 and 1,000,000.
        Then find:
        1. The 5 most common values (with their counts)
        2. The median
        3. The 95th percentile
        4. How many unique values there are
        Don't print the full list — just the statistics.
  scorers:
    - type: tool_called
      value: scratchpad
      weight: 1.0
    - type: llm_judge
      value: |
        With 10,000 random ints from 1-1,000,000:
        - Most common values should have low counts (likely 2-4 each due to
          birthday paradox — 10,000 from 1,000,000)
        - Median should be approximately 500,000 (within ~20,000)
        - 95th percentile should be approximately 950,000 (within ~20,000)
        - Unique values should be approximately 9,950-10,000 (very few collisions)

        The key test is that the code RUNS without printing 10,000 values,
        uses an appropriate method (collections.Counter, statistics module, etc.),
        and reports sensible numbers.

        Score 1 if all stats are computed and values are in reasonable ranges.
        Score 0.5 if the code runs but some stats are missing.
        Score 0 if it crashes, times out, or prints the full list.
      weight: 3.0

- id: class-design-with-inheritance
  category: complex
  description: "Design a class hierarchy and test polymorphism"
  estimated_cost_usd: 0.025
  tags: [scratchpad, oop]
  turns:
    - user_input: |
        Design a shape class hierarchy in Python:
        - Abstract base class Shape with abstract methods area() and perimeter()
        - Circle (takes radius)
        - Rectangle (takes width, height)
        - Square (inherits from Rectangle, takes side)
        - Triangle (takes three sides, use Heron's formula for area)

        Then create one of each, put them in a list, and sort by area
        (ascending). Print each shape's name, dimensions, area, and perimeter.

        Use these dimensions:
        - Circle: radius=5
        - Rectangle: 4×7
        - Square: side=6
        - Triangle: sides 3, 4, 5
  scorers:
    - type: tool_called
      value: scratchpad
      weight: 1.0
    - type: llm_judge
      value: |
        Expected results:
        - Triangle(3,4,5): area=6.0, perimeter=12
        - Rectangle(4,7): area=28.0, perimeter=22
        - Square(6): area=36.0, perimeter=24
        - Circle(5): area≈78.54, perimeter≈31.42

        Sorted by area: Triangle(6) < Rectangle(28) < Square(36) < Circle(78.54)

        Code should:
        - Use ABC and abstractmethod properly
        - Square should inherit from Rectangle (not Shape directly)
        - Heron's formula for triangle: s=(a+b+c)/2, area=sqrt(s*(s-a)*(s-b)*(s-c))
        - Sort should work via key=lambda or __lt__

        Score 1 if all areas/perimeters correct, sorted properly, and proper OOP design.
        Score 0.5 if values correct but OOP design has issues (e.g., Square not inheriting Rectangle).
        Score 0 if values are wrong or code doesn't run.
      weight: 3.0
