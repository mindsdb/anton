- id: iterative-debugging
  category: complex
  description: "User provides buggy code, assistant must debug across turns"
  estimated_cost_usd: 0.025
  tags: [scratchpad, multi-round, debugging]
  turns:
    - user_input: |
        I wrote this function but it's not working right. Can you help debug it?

        ```python
        def merge_sorted_lists(list1, list2):
            result = []
            i = j = 0
            while i < len(list1) and j < len(list2):
                if list1[i] <= list2[j]:
                    result.append(list1[i])
                    i += 1
                else:
                    result.append(list2[j])
                    i += 1
            return result
        ```

        When I call merge_sorted_lists([1, 3, 5], [2, 4, 6]) I expect [1, 2, 3, 4, 5, 6]
        but I'm not getting all elements.
    - user_input: "Great, now can you also make it handle the case where the lists have duplicates? Test with [1, 2, 2, 5] and [2, 3, 5, 7]"
  scorers:
    - type: tool_called
      value: scratchpad
      weight: 1.0
    - type: llm_judge
      value: |
        Bug 1: In the else branch, `i += 1` should be `j += 1`.
        Bug 2: The remaining elements of either list are never appended.

        The fixed function should:
        1. Fix j increment in else branch
        2. Append remaining elements from list1[i:] and list2[j:]
        3. Handle duplicates correctly (they should all appear in output)

        merge_sorted_lists([1, 3, 5], [2, 4, 6]) → [1, 2, 3, 4, 5, 6]
        merge_sorted_lists([1, 2, 2, 5], [2, 3, 5, 7]) → [1, 2, 2, 2, 3, 5, 5, 7]

        Score 1 if both bugs identified and both test cases pass.
        Score 0.5 if one bug found and fixed.
        Score 0 if wrong diagnosis.
      weight: 3.0

