- id: graph-shortest-path
  category: complex
  description: "Implement BFS/Dijkstra on a weighted graph"
  estimated_cost_usd: 0.020
  tags: [scratchpad, algorithm]
  turns:
    - user_input: |
        I have a weighted directed graph:
          A → B (weight 4)
          A → C (weight 2)
          B → D (weight 3)
          B → C (weight 1)
          C → B (weight 1)
          C → D (weight 5)
          D → E (weight 2)
          C → E (weight 8)

        Find the shortest path from A to E and its total cost.
        Show me the path step by step.
  scorers:
    - type: tool_called
      value: scratchpad
      weight: 1.0
    - type: contains
      value: "A"
      weight: 0.5
    - type: contains
      value: "E"
      weight: 0.5
    - type: llm_judge
      value: |
        The shortest path from A to E is: A → C → B → D → E
        With cost: 2 + 1 + 3 + 2 = 8

        Alternative valid answer: if they find A→B→D→E = 4+3+2 = 9 (longer).
        The optimal is A→C→B→D→E = 8.

        Score 1 if the correct shortest path (cost 8) is found.
        Score 0.5 if a valid path is found but not the shortest.
        Score 0 if wrong or no path found.
      weight: 3.0

- id: matrix-operations
  category: complex
  description: "Matrix multiplication, determinant, and inverse"
  estimated_cost_usd: 0.018
  tags: [scratchpad, math, computation]
  turns:
    - user_input: |
        Given these two matrices:
        A = [[1, 2, 3],
             [4, 5, 6],
             [7, 8, 10]]

        B = [[2, 0, 1],
             [1, 3, 0],
             [0, 1, 2]]

        Calculate:
        1. A × B (matrix multiplication)
        2. The determinant of A
        3. The inverse of A (if it exists)
  scorers:
    - type: tool_called
      value: scratchpad
      weight: 1.0
    - type: llm_judge
      value: |
        Correct answers:
        1. A × B = [[4, 9, 7], [13, 21, 16], [22, 34, 27]]
        2. det(A) = -3
        3. A is invertible (det ≠ 0). Inverse exists.
           A^-1 ≈ [[-2/3, -4/3, 1], [-2/3, 11/3, -2], [1, -2, 1]]
           (or equivalently in decimal: [[-0.667, -1.333, 1], [-0.667, 3.667, -2], [1, -2, 1]])

        Score 1 if all three are correct (within floating point tolerance).
        Score 0.5 if matrix multiply and determinant are correct but inverse is wrong.
        Score 0 if matrix multiply is wrong.
      weight: 3.0

- id: recursive-tree-traversal
  category: complex
  description: "Build a tree from edges, perform multiple traversals"
  estimated_cost_usd: 0.020
  tags: [scratchpad, algorithm, data-structures]
  turns:
    - user_input: |
        Build a binary tree from this list of (parent, left_child, right_child) tuples:
        (1, 2, 3), (2, 4, 5), (3, 6, 7), (5, 8, None), (7, None, 9)

        Then give me:
        1. Pre-order traversal
        2. In-order traversal
        3. Post-order traversal
        4. The height of the tree
        5. All leaf nodes
  scorers:
    - type: tool_called
      value: scratchpad
      weight: 1.0
    - type: llm_judge
      value: |
        The tree structure:
                1
               / \
              2   3
             / \ / \
            4  5 6  7
              /     \
             8       9

        Correct answers:
        1. Pre-order: [1, 2, 4, 5, 8, 3, 6, 7, 9]
        2. In-order: [4, 2, 8, 5, 1, 6, 3, 7, 9]
        3. Post-order: [4, 8, 5, 2, 6, 9, 7, 3, 1]
        4. Height: 4 (or 3 if counting edges instead of nodes)
        5. Leaf nodes: [4, 8, 6, 9]

        Score 1 if all five answers are correct.
        Score 0.5 if at least 3/5 are correct.
        Score 0 if fewer than 3 are correct.
      weight: 3.0

