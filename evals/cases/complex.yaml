# Complex eval cases — multi-step, real-world-ish tasks that stress
# tool orchestration, code generation quality, and reasoning depth.

# ---------------------------------------------------------------------------
# DATA PIPELINE & TRANSFORMATION
# ---------------------------------------------------------------------------

- id: etl-pipeline
  category: complex
  description: "Build a mini ETL: generate → clean → aggregate → summarize"
  estimated_cost_usd: 0.025
  tags: [scratchpad, multi-round, data-processing]
  turns:
    - user_input: |
        I have this raw sales data as a list of dicts:
        [
          {"date": "2024-01-15", "product": "Widget A", "qty": 10, "price": 5.99, "region": "North"},
          {"date": "2024-01-15", "product": "Widget B", "qty": 3, "price": 12.50, "region": "South"},
          {"date": "2024-01-16", "product": "Widget A", "qty": 7, "price": 5.99, "region": "North"},
          {"date": "2024-01-16", "product": "Widget A", "qty": "", "price": 5.99, "region": "South"},
          {"date": "2024-01-17", "product": "Widget B", "qty": 5, "price": null, "region": "North"},
          {"date": "2024-01-17", "product": "Widget A", "qty": 15, "price": 5.99, "region": "North"},
          {"date": "2024-01-17", "product": "Widget B", "qty": 8, "price": 12.50, "region": "South"},
          {"date": "invalid", "product": "Widget A", "qty": 2, "price": 5.99, "region": "East"}
        ]

        Clean this data (handle missing/invalid values), then give me:
        1. Total revenue per product
        2. Total revenue per region
        3. Which product-region combo had the highest revenue
  scorers:
    - type: tool_called
      value: scratchpad
      weight: 1.0
    - type: llm_judge
      value: |
        Valid records after cleaning (dropping rows with empty qty, null price, or invalid date):
        - Row 4: qty="" → drop or treat as 0
        - Row 5: price=null → drop or treat as 0
        - Row 8: date="invalid" → drop

        Expected approximate results (depending on cleaning strategy):
        - Widget A revenue: (10*5.99)+(7*5.99)+(15*5.99) = 191.68 (or +2*5.99=203.66 if row 8 kept)
        - Widget B revenue: (3*12.50)+(8*12.50) = 137.50 (or +5*12.50=200 if row 5 kept with price=0→drop)
        - North region should have the highest revenue
        - Best product-region combo: Widget A / North

        Score 1 if all three questions are answered with reasonable values and
        the data cleaning is explained. Score 0.5 if mostly right. Score 0 if wrong.
      weight: 3.0

- id: regex-log-parser
  category: complex
  description: "Parse structured log lines with regex, extract stats"
  estimated_cost_usd: 0.020
  tags: [scratchpad, multi-round, text-processing]
  turns:
    - user_input: |
        Parse these web server logs and give me a summary:

        ```
        192.168.1.10 - - [15/Jan/2024:10:15:32 +0000] "GET /api/users HTTP/1.1" 200 1234
        192.168.1.15 - - [15/Jan/2024:10:15:33 +0000] "POST /api/login HTTP/1.1" 200 567
        10.0.0.5 - - [15/Jan/2024:10:15:34 +0000] "GET /api/users HTTP/1.1" 200 1234
        192.168.1.10 - - [15/Jan/2024:10:15:35 +0000] "GET /api/products HTTP/1.1" 404 89
        192.168.1.15 - - [15/Jan/2024:10:15:36 +0000] "POST /api/login HTTP/1.1" 401 45
        10.0.0.5 - - [15/Jan/2024:10:15:37 +0000] "GET /api/users HTTP/1.1" 500 0
        192.168.1.10 - - [15/Jan/2024:10:15:38 +0000] "DELETE /api/users/5 HTTP/1.1" 204 0
        192.168.1.10 - - [15/Jan/2024:10:15:39 +0000] "GET /static/main.css HTTP/1.1" 200 8901
        10.0.0.5 - - [15/Jan/2024:10:16:01 +0000] "GET /api/users HTTP/1.1" 200 1234
        ```

        Tell me:
        1. Request count per HTTP method
        2. Count of each status code
        3. Which IP made the most requests
        4. Which endpoint had the most errors (4xx or 5xx)
  scorers:
    - type: tool_called
      value: scratchpad
      weight: 1.0
    - type: llm_judge
      value: |
        Correct answers:
        1. Methods: GET=6, POST=2, DELETE=1
        2. Status codes: 200=5, 404=1, 401=1, 500=1, 204=1
        3. Most requests: 192.168.1.10 (4 requests)
        4. Most errors: /api/users (1×500) and /api/products (1×404) and /api/login (1×401)
           — /api/users or /api/login are acceptable answers for "most errors"

        Score 1 if all four answers are correct. Score 0.5 if 3/4 correct. Score 0 if fewer.
      weight: 3.0

