- id: datetime-timezone-math
  category: complex
  description: "Complex timezone arithmetic across DST boundaries"
  estimated_cost_usd: 0.018
  tags: [scratchpad, stdlib]
  turns:
    - user_input: |
        Using Python's datetime and zoneinfo modules, answer these:

        1. If it's 2024-03-10 01:30 AM in US/Eastern, what time is it in UTC?
           (Note: March 10 2024 is when US clocks spring forward)
        2. If a meeting is at 9:00 AM Tokyo time (Asia/Tokyo) on 2024-07-15,
           what time is that in London (Europe/London) and New York (America/New_York)?
        3. How many hours between 2024-11-02 23:00 US/Eastern and 2024-11-03 23:00 US/Eastern?
           (Note: Nov 3 2024 is when US clocks fall back)
  scorers:
    - type: tool_called
      value: scratchpad
      weight: 1.0
    - type: llm_judge
      value: |
        Correct answers:
        1. 2024-03-10 01:30 AM EST = 06:30 UTC (before spring forward at 2AM)
        2. Tokyo 9:00 AM → London 1:00 AM (BST, UTC+1) → New York 8:00 PM previous day (EDT, UTC-4)
           (Tokyo is UTC+9, so 9AM Tokyo = 00:00 UTC = 1:00 BST = 20:00 EDT)
        3. 25 hours (not 24), because clocks fall back — gaining one hour

        Score 1 if all three are correct.
        Score 0.5 if 2/3 correct.
        Score 0 if fewer.
      weight: 3.0

- id: json-schema-validator
  category: complex
  description: "Build a JSON schema validator from scratch and test edge cases"
  estimated_cost_usd: 0.022
  tags: [scratchpad, multi-round]
  turns:
    - user_input: |
        Write a simple JSON schema validator function (don't use jsonschema library).
        It should support these types: string, integer, number, boolean, array, object.
        And these constraints: required fields, minLength, maxLength, minimum, maximum.

        Test it with this schema:
        {
          "type": "object",
          "required": ["name", "age"],
          "properties": {
            "name": {"type": "string", "minLength": 1, "maxLength": 50},
            "age": {"type": "integer", "minimum": 0, "maximum": 150},
            "email": {"type": "string"},
            "scores": {"type": "array"}
          }
        }

        And these test cases:
        1. {"name": "Alice", "age": 30} → valid
        2. {"name": "", "age": 30} → invalid (minLength)
        3. {"name": "Bob"} → invalid (missing required 'age')
        4. {"name": "Charlie", "age": -5} → invalid (minimum)
        5. {"name": "Diana", "age": 30, "scores": [95, 87]} → valid
  scorers:
    - type: tool_called
      value: scratchpad
      weight: 1.0
    - type: llm_judge
      value: |
        The validator function should:
        1. Handle type checking for all 6 types
        2. Check required fields
        3. Validate minLength/maxLength for strings
        4. Validate minimum/maximum for numbers
        5. Return clear pass/fail for each test case

        All 5 test cases should produce the correct result:
        1. Valid, 2. Invalid, 3. Invalid, 4. Invalid, 5. Valid

        Score 1 if all 5 test cases pass correctly and the code is well-structured.
        Score 0.5 if 4/5 pass or the code has minor issues.
        Score 0 if fewer than 4 pass.
      weight: 3.0

